<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ServiceNow - Preview Responsivo</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    html,
    body {
      width: 100%;
      min-height: 100%;
      min-height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #app {
      width: 100%;
      max-width: 1200px;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }
    #stage {
      position: relative;
      overflow: hidden;
      border-radius: 24px;
      background-color: #111;
      background-repeat: no-repeat;
      background-position: center center;
      background-size: cover;
      box-shadow: 0 32px 80px rgba(0, 0, 0, 0.35);
    }
    #bg-placeholder,
    #video-placeholder {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18px;
      color: rgba(255, 255, 255, 0.92);
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.02em;
      background: rgba(0, 0, 0, 0.28);
      pointer-events: none;
    }
    #video-placeholder {
      background: rgba(0, 0, 0, 0.45);
    }
    #video-container {
      position: absolute;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
    }
    #video-frame {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border: 0;
      display: block;
    }

    /* ===== QR POPUP FIXO (Desktop + Mobile) ===== */
    #qr-popup {
      position: fixed;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      z-index: 100;
      display: block;
      width: 220px;
      max-width: 55vw;
      height: auto;
      opacity: 1;
      pointer-events: auto;
      transition: opacity 0.2s ease, transform 0.2s ease;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.45);
      border-radius: 16px;
      overflow: hidden;
    }
    #qr-popup img {
      width: 100%;
      height: auto;
      display: block;
    }
    #qr-popup:hover {
      transform: translateX(-50%) scale(1.03);
    }

    #device-badge {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 10;
      background: rgba(17, 24, 39, 0.88);
      color: #fff;
      font-size: 12px;
      padding: 8px 12px;
      border-radius: 999px;
      letter-spacing: 0.3px;
      user-select: none;
      backdrop-filter: blur(4px);
    }

    /* Mobile */
    @media (max-width: 768px) {
      body {
        padding: 10px;
      }
      #qr-popup {
        width: 260px;
        max-width: 75vw;
        bottom: 24px;
      }
    }
  </style>
</head>
<body>
  <div id="app">
    <div id="stage">
      <div id="bg-placeholder">Carregando imagem de fundo…</div>
      <div id="video-container">
        <video
          id="video-frame"
          controls
          autoplay
          playsinline
          loop
        >
          <source src="service-now.mp4" type="video/mp4" />
          Seu navegador não suporta reprodução de vídeo.
        </video>
        <div id="video-placeholder">Carregando vídeo…</div>
      </div>
    </div>

    <!-- QR CODE POPUP - Agora fixo e centralizado -->
    <a
      id="qr-popup"
      href="https://academiadamodacea.com.br/app/cursopresencial/matricula/a8c85dda-fa08-40c8-a35c-e5f49c6f3195"
      target="_blank"
      rel="noopener noreferrer"
    >
      <img src="QR CODE POPUP.png" alt="QR Code - Matrícula" />
    </a>

    <div id="device-badge">Ajustando layout…</div>
  </div>

  <script>
    const BACKGROUND_DESKTOP = "bg-desktop.png";
    const BACKGROUND_MOBILE = "BG CELULAR.jpeg";
    const VIDEO_URL = "service-now.mp4";

    const LAYOUTS = {
      desktop: {
        baseWidth: 1920,
        baseHeight: 1080,
        video: {
          x: 466.9,
          y: 235.8,
          width: 1400,
          height: 787.5,
        },
      },
      mobile: {
        baseWidth: 1080,
        baseHeight: 1920,
        video: {
          x: 0,
          y: 471.2,
          width: 1080,
          height: 607.5,
        },
      },
    };

    const stage = document.getElementById("stage");
    const videoContainer = document.getElementById("video-container");
    const videoFrame = document.getElementById("video-frame");
    const bgPlaceholder = document.getElementById("bg-placeholder");
    const videoPlaceholder = document.getElementById("video-placeholder");
    const deviceBadge = document.getElementById("device-badge");

    function detectMode() {
      const isSmall = window.innerWidth <= 768;
      const isMobileUA = /Android|iPhone|iPad|iPod|webOS|BlackBerry|IEMobile|Opera Mini/i.test(
        navigator.userAgent
      );
      return isSmall || isMobileUA ? "mobile" : "desktop";
    }

    function applyBackground(mode) {
      const image = mode === "mobile" ? BACKGROUND_MOBILE : BACKGROUND_DESKTOP;
      stage.style.backgroundImage = `url('${encodeURI(image)}')`;
      bgPlaceholder.style.display = "none";
    }

    function applyVideo() {
      const source = videoFrame.querySelector("source");
      if (source && VIDEO_URL) {
        source.src = VIDEO_URL;
        videoFrame.load();
        videoFrame.muted = false;
        videoFrame.style.display = "block";
        videoPlaceholder.style.display = "none";
      } else {
        videoFrame.style.display = "none";
        videoPlaceholder.textContent = "Vídeo não disponível";
      }
    }

    function resizeStage() {
      const mode = detectMode();
      const config = LAYOUTS[mode];
      const vw = Math.max(window.innerWidth - 32, 320);
      const vh = Math.max(window.innerHeight - 32, 320);
      const targetRatio = config.baseWidth / config.baseHeight;

      let width = vw;
      let height = Math.round(width / targetRatio);

      if (height > vh) {
        height = vh;
        width = Math.round(height * targetRatio);
      }

      stage.style.width = `${width}px`;
      stage.style.height = `${height}px`;

      const left = (config.video.x / config.baseWidth) * 100;
      const top = (config.video.y / config.baseHeight) * 100;
      const widthPct = (config.video.width / config.baseWidth) * 100;
      const heightPct = (config.video.height / config.baseHeight) * 100;

      videoContainer.style.left = `${left}%`;
      videoContainer.style.top = `${top}%`;
      videoContainer.style.width = `${widthPct}%`;
      videoContainer.style.height = `${heightPct}%`;

      deviceBadge.textContent =
        mode === "mobile"
          ? "Modo mobile • 1080 × 1920"
          : "Modo desktop • 1920 × 1080";
    }

    function init() {
      applyBackground(detectMode());
      applyVideo();
      resizeStage();
    }

    window.addEventListener("resize", resizeStage);
    window.addEventListener("orientationchange", resizeStage);
    window.addEventListener("load", init);
  </script>
</body>
</html>
