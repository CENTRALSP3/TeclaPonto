<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeclaPonto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f2eded;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ===== CANVAS 1920×1080 ===== */
    .canvas {
      width: 1920px;
      max-width: calc(100vw - 40px);
      height: 1080px;
      max-height: calc(100vh - 40px);
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 120px 1fr;
      gap: 0;
      background: #f2eded;
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.06),
        0 32px 80px rgba(0,0,0,0.15);
      position: relative;
    }

    /* BG image overlay — full canvas */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('bg-textura.png') center/cover no-repeat;
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
    }

    /* ===== SIDEBAR — 320px (reduzida 20%) ===== */
    .sidebar {
      grid-column: 1 / 2;
      grid-row: 1 / 3;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      position: relative;
      z-index: 5;
      border-right: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
    }

    /* --- LOGO substituída por LOGO.png --- */
    .logo-container {
      width: 100%;
      height: 380px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .logo-container img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* --- QR CODE --- */
    .qr-container {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 10px 30px;
      min-height: 420px;
    }
    .qr-container img {
      width: 250px;
      height: 250px;
      display: block;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .qr-label {
      margin-top: 10px;
      font-size: 11px;
      color: rgba(0,0,0,0.4);
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
    }

    /* --- DOWNLOAD --- */
    .download-area {
      width: 100%;
      padding: 20px 40px 30px;
      display: flex;
      justify-content: center;
    }
    .download-btn {
      width: 240px;
      height: 80px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(46, 204, 113, 0.3);
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(46, 204, 113, 0.45);
    }
    .download-btn svg {
      width: 24px;
      height: 24px;
      fill: currentColor;
    }

    /* ===== MAIN CONTENT ===== */
    .content {
      grid-column: 2 / 3;
      grid-row: 1 / 3;
      display: grid;
      grid-template-rows: 120px 1fr;
      position: relative;
      z-index: 5;
    }

    /* --- TÍTULO substituído por imagem --- */
    .title-container {
      display: flex;
      align-items: center;
      padding: 0 40px;
      border-bottom: 1px solid rgba(0,0,0,0.06);
    }
    .title-container img {
      height: 70px;
      width: auto;
      object-fit: contain;
      display: block;
    }

    /* --- VÍDEO --- */
    .video-container {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 30px 40px;
    }
    .video-wrapper {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* ===== RESPONSIVO ===== */
    @media (max-width: 1100px) {
      .canvas {
        grid-template-columns: 260px 1fr;
        grid-template-rows: 100px 1fr;
        max-width: 100vw;
        max-height: none;
        height: auto;
        min-height: 100vh;
        border-radius: 0;
      }
      .canvas::before { border-radius: 0; }

      .logo-container { height: 260px; }
      .qr-container { min-height: 280px; }
      .qr-container img { width: 200px; height: 200px; }
      .download-btn { width: 200px; height: 64px; font-size: 14px; }
      .download-area { padding: 20px 20px 24px; }
      .title-container img { height: 50px; }
    }

    @media (max-width: 768px) {
      html, body { background: #f2eded; }
      body { align-items: flex-start; }
      .canvas {
        display: flex;
        flex-direction: column;
        max-width: 100vw;
        min-height: 100vh;
        height: auto;
        border-radius: 0;
        box-shadow: none;
      }
      .canvas::before { border-radius: 0; }

      .sidebar {
        border-right: none;
        border-bottom: 1px solid rgba(0,0,0,0.06);
        padding: 16px;
        gap: 12px;
        background: rgba(255,255,255,0.6);
      }

      .logo-container {
        height: 160px;
        padding: 10px;
      }

      .qr-container {
        min-height: auto;
        padding: 10px 20px;
      }
      .qr-container img { width: 180px; height: 180px; }

      .download-area {
        padding: 12px 20px 20px;
      }
      .download-btn {
        width: 100%;
        max-width: 320px;
        height: 60px;
        font-size: 14px;
      }

      .content {
        display: flex;
        flex-direction: column;
        flex: 1;
      }

      .title-container {
        padding: 16px 20px;
        min-height: 60px;
      }
      .title-container img {
        height: 40px;
      }

      .video-container {
        padding: 12px;
        flex: 1;
        min-height: 300px;
      }
    }

    @media (max-width: 480px) {
      .logo-container { height: 120px; }
      .qr-container img { width: 140px; height: 140px; }
      .download-btn { height: 52px; font-size: 13px; }
      .title-container img { height: 32px; }
      .video-container { min-height: 220px; padding: 8px; }
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- SIDEBAR — 320px -->
    <aside class="sidebar">

      <div class="logo-container">
        <img src="LOGO.png" alt="TeclaPonto">
      </div>

      <div class="qr-container">
        <a href="https://academiadamodacea.com.br/app/cursopresencial/matricula/a8c85dda-fa08-40c8-a35c-e5f49c6f3195" target="_blank" rel="noopener noreferrer">
          <img src="qrcode.png" alt="QR Code">
        </a>
        <div class="qr-label">Acesse o curso</div>
      </div>

      <div class="download-area">
        <a class="download-btn"
           href="https://ceabr-my.sharepoint.com/:b:/g/personal/lucas_banza_cea_com_br/IQBkypRdn-YJQa2VD_Xw97rlAUjbVLVNs3R-Ro2CL5kXbMo?e=Zd6FeZ"
           target="_blank" rel="noopener noreferrer">
          <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
          DOWNLOAD
        </a>
      </div>

    </aside>

    <!-- MAIN CONTENT -->
    <main class="content">

      <header class="title-container">
        <img src="TITULO.png" alt="TeclaPonto">
      </header>

      <section class="video-container">
        <div class="video-wrapper">
          <video controls autoplay playsinline loop>
            <source src="service-now.mp4" type="video/mp4">
            Seu navegador não suporta reprodução de vídeo.
          </video>
        </div>
      </section>

    </main>

  </div>
</body>
</html>
