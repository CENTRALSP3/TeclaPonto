<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TeclaPonto</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%;
      min-height: 100vh;
      font-family: 'Inter', system-ui, sans-serif;
      background: #f2eded;
      color: #1a1a1a;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* =========================================================
       DESKTOP — CANVAS 1920×1080 com grid 2 colunas
       ========================================================= */
    .canvas {
      width: 1920px;
      max-width: calc(100vw - 40px);
      height: 1080px;
      max-height: calc(100vh - 40px);
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: 1fr;
      gap: 0;
      background: #f2eded;
      border-radius: 20px;
      overflow: hidden;
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.06),
        0 32px 80px rgba(0,0,0,0.15);
      position: relative;
    }

    /* BG image overlay */
    .canvas::before {
      content: '';
      position: absolute;
      inset: 0;
      background: url('bg-textura.png') center/cover no-repeat;
      opacity: 0.35;
      pointer-events: none;
      z-index: 1;
      mix-blend-mode: multiply;
    }

    /* ===== SIDEBAR — desktop ===== */
    .sidebar {
      grid-column: 1 / 2;
      grid-row: 1 / 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 0;
      position: relative;
      z-index: 5;
      border-right: 1px solid rgba(0,0,0,0.06);
      background: rgba(255,255,255,0.5);
      backdrop-filter: blur(4px);
    }

    /* --- LOGO (desktop: topo, 320px) --- */
    .logo-container {
      width: 100%;
      height: 320px;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 24px;
    }

    /* --- TÍTULO (desktop: logo abaixo da logo) --- */
    .sidebar-title-container {
      width: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 0 16px 12px;
    }
    .sidebar-title-container h1 {
      font-size: 24px;
      font-weight: 700;
      color: #fff0d9;
      text-shadow:
        -2px -2px 0 #1e5175,  2px -2px 0 #1e5175,
        -2px  2px 0 #1e5175,   2px  2px 0 #1e5175,
         0   -2px 0 #1e5175,   0    2px 0 #1e5175,
        -2px  0   0 #1e5175,   2px  0   0 #1e5175;
      text-align: center;
      line-height: 1.2;
    }

    /* --- QR CODE --- */
    .qr-container {
      width: 100%;
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 8px 24px;
      min-height: 320px;
    }
    .qr-container img {
      width: 200px;
      height: 200px;
      display: block;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    }
    .qr-label {
      margin-top: 8px;
      font-size: 11px;
      color: #1e5175;
      font-weight: 500;
      letter-spacing: 0.3px;
      text-align: center;
      line-height: 1.4;
    }
    .qr-label strong {
      color: #d4af37;
      font-weight: 800;
    }
    .qr-alert {
      margin-top: 2px;
      font-size: 9px;
      color: #e74c3c;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      text-align: center;
    }

    /* --- DOWNLOAD (desktop: abaixo do QR na sidebar) --- */
    .download-area {
      width: 100%;
      padding: 12px 40px 20px;
      display: flex;
      justify-content: center;
    }
    .download-btn {
      width: 200px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      background: linear-gradient(135deg, #2ecc71 0%, #27ae60 100%);
      color: #fff;
      font-family: 'Inter', sans-serif;
      font-weight: 700;
      font-size: 15px;
      letter-spacing: 1px;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(46, 204, 113, 0.3);
    }
    .download-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(46, 204, 113, 0.45);
    }
    .download-btn svg {
      width: 22px;
      height: 22px;
      fill: currentColor;
    }

    /* ===== MAIN CONTENT — desktop ===== */
    .content {
      grid-column: 2 / 3;
      grid-row: 1 / 2;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 5;
    }

    /* --- VÍDEO (desktop: centralizado verticalmente) --- */
    .video-container {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 40px;
    }
    .video-wrapper {
      width: 100%;
      height: 100%;
      border-radius: 12px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 32px rgba(0,0,0,0.2);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .video-wrapper video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    /* =========================================================
       TABLET (768–1100px) — grid adaptado
       ========================================================= */
    @media (max-width: 1100px) {
      .canvas {
        grid-template-columns: 240px 1fr;
        max-width: 100vw;
        max-height: none;
        height: auto;
        min-height: 100vh;
        border-radius: 0;
      }
      .canvas::before { border-radius: 0; }

      .logo-container { height: 200px; padding: 16px; }
      .sidebar-title-container h1 { font-size: 20px; }
      .sidebar-title-container { padding: 0 12px 8px; }
      .qr-container { min-height: 200px; }
      .qr-container img { width: 160px; height: 160px; }
      .download-btn { width: 160px; height: 56px; font-size: 12px; }
      .download-area { padding: 8px 20px 16px; }
      .video-container { padding: 16px 24px; }
    }

    /* =========================================================
       MOBILE (<=768px) — vertical layout
       Ordem: LOGO → TÍTULO → VÍDEO → QR + DOWNLOAD (lado a lado)
       ========================================================= */
    @media (max-width: 768px) {
      html, body { background: #f2eded; }
      body { align-items: flex-start; }

      /* Esconder estrutura desktop grid */
      .canvas {
        display: flex;
        flex-direction: column;
        width: 100%;
        max-width: 100vw;
        min-height: 100vh;
        height: auto;
        border-radius: 0;
        box-shadow: none;
        padding: 0;
      }
      .canvas::before {
        border-radius: 0;
        position: fixed;
        height: 100%;
      }

      /* Sidebar vira wrapper flex vertical */
      .sidebar {
        border-right: none;
        background: transparent;
        backdrop-filter: none;
        padding: 20px 16px 8px;
        gap: 8px;
        width: 100%;
      }

      /* 1. LOGO — centralizada */
      .logo-container {
        height: auto;
        width: 100%;
        padding: 0;
        display: flex;
        justify-content: center;
      }
      .logo-container img {
        width: 260px;
        height: auto;
        max-height: 160px;
      }

      /* 2. TÍTULO — abaixo da logo */
      .sidebar-title-container {
        padding: 8px 16px 12px;
        width: 100%;
      }
      .sidebar-title-container h1 {
        font-size: 32px;
        line-height: 1.15;
      }

      /* Esconder QR da sidebar no mobile — aparece só no bottom-actions */
      .sidebar > .qr-container {
        display: none;
      }

      /* 3. VÍDEO — destaque principal */
      .content {
        display: flex;
        flex-direction: column;
        flex: 0 0 auto;
        padding: 0 12px;
      }
      .video-container {
        transform: none;
        padding: 0;
        width: 100%;
        aspect-ratio: 16 / 9;
        display: flex;
      }
      .video-wrapper {
        border-radius: 10px;
        width: 100%;
        aspect-ratio: 16 / 9;
      }
      .video-wrapper video {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }

      /* 4. BOTTOM ACTIONS — QR + download lado a lado, 25% abaixo */
      .download-area {
        display: none; /* esconder botão da sidebar no mobile */
      }
      .bottom-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        width: 100%;
        padding: 20px 20px 24px;
        gap: 16px;
        margin-top: 15vh;
      }
      .bottom-actions .qr-container {
        flex: 0 0 45%;
        max-width: 45%;
        padding: 0;
      }
      .bottom-actions .qr-container img {
        width: 100%;
        height: auto;
        max-width: 200px;
      }
      .bottom-actions .qr-label { font-size: 9px; }
      .bottom-actions .qr-alert { font-size: 8px; }

      .bottom-actions .download-btn {
        flex: 0 0 45%;
        max-width: 45%;
        width: auto;
        height: 80px;
        font-size: 13px;
      }
    }

    /* Bottom-actions hidden on desktop, shown on mobile */
    .bottom-actions { display: none; }

    @media (max-width: 768px) {
      .bottom-actions { display: flex; }
    }

    @media (max-width: 480px) {
      .sidebar { padding: 12px 12px 4px; }
      .logo-container img { width: 200px; max-height: 120px; }
      .sidebar-title-container h1 { font-size: 24px; }
      .sidebar-title-container { padding: 4px 12px 8px; }
      .qr-container img { width: 150px; height: 150px; }
      .content { padding: 0 8px; }
      .bottom-actions { padding: 8px 12px 16px; gap: 10px; margin-top: 8vh; }
      .bottom-actions .download-btn { height: 60px; font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="canvas">

    <!-- ===== MAIN CONTENT ===== -->
    <main class="content">
      <!-- VÍDEO (desktop: ocupa toda content; mobile: logo abaixo do título) -->
      <section class="video-container">
        <div class="video-wrapper">
          <video controls autoplay playsinline loop>

    <!-- ===== BOTTOM ACTIONS (mobile ONLY: QR + download lado a lado) ===== -->
    <div class="bottom-actions">

          <img src="qrcode.png" alt="QR Code">
        </a>
        <div class="qr-label">
          Registre sua presença <strong>LENDO</strong> ou <strong>CLICANDO</strong> no QR CODE
        </div>
        <div class="qr-alert">Obrigatório</div>
      </div>
      <a class="download-btn"
         href="https://ceabr-my.sharepoint.com/:b:/g/personal/lucas_banza_cea_com_br/IQBkypRdn-YJQa2VD_Xw97rlAUjbVLVNs3R-Ro2CL5kXbMo?e=Zd6FeZ"
         target="_blank" rel="noopener noreferrer">

    </div>

  </div>
</body>
